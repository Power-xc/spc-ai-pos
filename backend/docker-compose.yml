services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dunkin-ai-agent-api
    working_dir: /app
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: br-pos-postgres
    environment:
      POSTGRES_DB: br_pos
      POSTGRES_USER: brpos
      POSTGRES_PASSWORD: brpos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brpos -d br_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dunkin-ai-agent-redis
    profiles: ["realtime"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
